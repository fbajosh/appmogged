<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppMogged. Get mogged.</title>
    <link rel="icon" type="image/svg+xml" href="/appmogged.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            height: 100vh;
            overflow: hidden; /* Prevent actual scrolling */
            background: #131313;
        }
        
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            isolation: isolate;
        }
        
        body.scrolled .triangle-top-right {
            clip-path: polygon(-12% 0%, 100% 0%, 100% 70%);
            height: 70vh;
        }
        
        body.scrolled .triangle-top-left {
            clip-path: polygon(0% 0%, 0% 68%, 100% 0%);
            height: 70vh;
        }
        
        body.scrolled .triangle-bottom-right {
            clip-path: polygon(100% 32%, 100% 100%, 0% 100%);
            height: 70vh;
        }
        
        body.scrolled .triangle-bottom-left {
            clip-path: polygon(0% 30%, 112% 100%, 0% 100%);
            height: 70vh;
        }
        
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1C1C1C 0%, #131313 100%);
            z-index: 0;
        }

        .smoke-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
            filter: blur(12px);
            opacity: 0.78;
        }

        .smoke-layer::before,
        .smoke-layer::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -24vh;
            width: 112vw;
            height: 72vh;
            border-radius: 50%;
            background:
                radial-gradient(circle at 22% 74%, rgba(255, 255, 255, 0.14), transparent 19%),
                radial-gradient(circle at 42% 68%, rgba(255, 255, 255, 0.11), transparent 23%),
                radial-gradient(circle at 63% 72%, rgba(255, 255, 255, 0.13), transparent 21%),
                radial-gradient(circle at 80% 66%, rgba(255, 255, 255, 0.09), transparent 22%);
            transform: translateX(-50%);
            animation: smoke-haze 4.5s ease-in-out infinite;
        }

        .smoke-layer::after {
            bottom: -18vh;
            width: 92vw;
            height: 62vh;
            opacity: 0.68;
            animation-delay: -2.25s;
            animation-duration: 5.5s;
        }

        .smoke {
            position: absolute;
            left: var(--x);
            bottom: -28vh;
            width: var(--size);
            height: var(--size);
            border-radius: 48% 52% 55% 45%;
            background:
                radial-gradient(circle at 42% 38%, rgba(255, 255, 255, 0.2), transparent 24%),
                radial-gradient(circle at 62% 58%, rgba(255, 255, 255, 0.13), transparent 30%),
                radial-gradient(circle at 34% 68%, rgba(255, 255, 255, 0.09), transparent 32%);
            opacity: 0;
            transform: translate3d(-50%, 0, 0) scale(0.55) rotate(var(--rotate));
            animation: smoke-rise var(--duration) linear infinite;
            animation-delay: var(--delay);
            will-change: transform, opacity;
        }
        
        .triangle-top-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 100vw;
            height: 33vh;
            background: linear-gradient(135deg, #1E1E1E, #232323);
            clip-path: polygon(4% 0%, 100% 0%, 100% 33%);
            z-index: 5;
            transition: all 0.3s ease-out;
        }
        
        .triangle-top-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 33vh;
            background: linear-gradient(45deg, #373737, #2F2F2F);
            clip-path: polygon(0% 0%, 0% 32%, 100% 0%);
            z-index: 4;
            transition: all 0.3s ease-out;
        }
        
        .triangle-bottom-right {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100vw;
            height: 33vh;
            background: linear-gradient(135deg, #373737, #2F2F2F);
            clip-path: polygon(100% 68%, 100% 100%, 0% 100%);
            z-index: 6;
            transition: all 0.3s ease-out;
        }
        
        .triangle-bottom-left {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 33vh;
            background: linear-gradient(45deg, #1E1E1E, #232323);
            clip-path: polygon(0% 67%, 96% 100%, 0% 100%);
            z-index: 7;
            transition: all 0.3s ease-out;
        }
        
        .logo-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(50vw, 620px);
            aspect-ratio: 410 / 141;
            perspective: 1100px;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .logo-breath {
            width: 100%;
            height: 100%;
            animation: logo-breathe 7.5s ease-in-out infinite;
            transform-origin: center;
        }

        .logo-flipper {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .logo-face {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform-style: preserve-3d;
            transform-origin: center;
            transition: transform 0.82s cubic-bezier(0.2, 0.7, 0.2, 1), filter 0.82s cubic-bezier(0.2, 0.7, 0.2, 1);
        }

        .logo-front {
            padding: 0;
            background: transparent;
            cursor: pointer;
            transform: rotateX(0deg);
        }

        .logo-stage.is-flipped .logo-front {
            transform: rotateX(180deg);
        }

        .logo-front img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .logo-back {
            display: grid;
            place-items: center;
            padding: clamp(12px, 2.4vw, 26px) clamp(18px, 3vw, 40px);
            transform: rotateX(-180deg);
        }

        .logo-stage.is-flipped .logo-back {
            transform: rotateX(0deg);
        }

        .logo-back-shape {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .logo-links {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: clamp(7px, 1.5vw, 14px);
            max-width: 82%;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        .logo-links-title {
            flex-basis: 100%;
            color: rgba(255, 255, 255, 0.92);
            font-size: clamp(10px, 1.4vw, 16px);
            font-weight: 400;
            line-height: 1;
            letter-spacing: 0;
            text-transform: none;
        }

        .logo-links a {
            color: #ffffff;
            font-size: clamp(13px, 2.1vw, 24px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: 0;
            text-decoration: none;
            text-transform: uppercase;
            border-radius: 6px;
            padding: clamp(5px, 0.8vw, 8px) clamp(6px, 1vw, 10px);
            text-shadow: 0 1px 10px rgba(19, 19, 19, 0.32);
            transition: background 0.2s ease, color 0.2s ease;
        }

        .logo-links a:hover,
        .logo-links a:focus-visible {
            color: #131313;
            background: rgba(255, 255, 255, 0.9);
            outline: none;
        }

        .logo-links-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.82);
        }

        .logo-stage:hover .logo-face,
        .logo-stage:focus-within .logo-face {
            filter: brightness(1.08);
        }

        .audio-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: grid;
            place-items: center;
            width: 36px;
            height: 36px;
            color: rgba(255, 255, 255, 0.58);
            background: transparent;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s ease, opacity 0.2s ease;
        }

        .audio-toggle:hover,
        .audio-toggle:focus-visible {
            color: rgba(255, 255, 255, 0.88);
            outline: none;
        }

        .audio-toggle svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 2;
        }

        .audio-toggle .muted-line {
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .audio-toggle.is-muted .sound-wave {
            opacity: 0;
        }

        .audio-toggle.is-muted .muted-line {
            opacity: 1;
        }

        @keyframes smoke-rise {
            0% {
                opacity: 0;
                transform: translate3d(-50%, 0, 0) scale(0.52) rotate(var(--rotate));
            }

            14% {
                opacity: var(--opacity);
            }

            68% {
                opacity: var(--opacity);
            }

            100% {
                opacity: 0;
                transform: translate3d(calc(-50% + var(--drift)), -124vh, 0) scale(1.55) rotate(calc(var(--rotate) + 26deg));
            }
        }

        @keyframes smoke-haze {
            0%, 100% {
                transform: translateX(-50%) translateY(0) scale(1);
            }

            50% {
                transform: translateX(-50%) translateY(-10vh) scale(1.08);
            }
        }

        @keyframes logo-breathe {
            0%, 100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.045);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .smoke-layer::before,
            .smoke-layer::after,
            .smoke {
                animation: none;
            }

            .smoke {
                opacity: var(--opacity);
                transform: translate3d(calc(-50% + var(--drift)), -58vh, 0) scale(1.1) rotate(var(--rotate));
            }

            .logo-breath {
                animation: none;
            }
        }

        @media (max-width: 700px) {
            .logo-stage {
                width: 82vw;
            }
        }
    </style>
    <script>
        let scrollAccumulator = 0;
        
        window.addEventListener('wheel', function(e) {
            e.preventDefault(); // Prevent actual scrolling
            
            // Accumulate scroll delta
            scrollAccumulator += e.deltaY;
            
            // Determine if we should be in "scrolled" state
            const shouldBeScrolled = scrollAccumulator > 100;
            const currentlyScrolled = document.body.classList.contains('scrolled');
            
            // Only toggle if state should change
            if (shouldBeScrolled !== currentlyScrolled) {
                document.body.classList.toggle('scrolled', shouldBeScrolled);
            }
            
            // Reset accumulator if we've gone too far in either direction
            if (scrollAccumulator < 0) scrollAccumulator = 0;
            if (scrollAccumulator > 200) scrollAccumulator = 200;
        }, { passive: false });
        
        // Also handle touch/trackpad gestures
        window.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('DOMContentLoaded', function() {
            const music = document.getElementById('background-music');
            const muteButton = document.querySelector('.audio-toggle');
            if (music && muteButton) {
                const syncMuteState = function() {
                    muteButton.classList.toggle('is-muted', music.muted);
                    muteButton.setAttribute('aria-pressed', String(music.muted));
                    muteButton.setAttribute('aria-label', music.muted ? 'Unmute music' : 'Mute music');
                };

                const playMusic = function() {
                    const playAttempt = music.play();
                    if (playAttempt && typeof playAttempt.catch === 'function') {
                        playAttempt.catch(function() {});
                    }
                };

                muteButton.addEventListener('click', function() {
                    music.muted = !music.muted;
                    syncMuteState();
                    playMusic();
                });

                ['click', 'keydown', 'pointerdown', 'wheel', 'touchstart'].forEach(function(eventName) {
                    window.addEventListener(eventName, playMusic, { once: true, passive: true });
                });

                syncMuteState();
                playMusic();
            }

            const logoStage = document.querySelector('.logo-stage');
            const logoFront = document.querySelector('.logo-front');
            const logoBack = document.querySelector('.logo-back');
            if (logoStage && logoFront && logoBack) {
                const logoLinks = Array.from(logoBack.querySelectorAll('a'));
                const setLogoFlipped = function(isFlipped) {
                    logoStage.classList.toggle('is-flipped', isFlipped);
                    logoFront.setAttribute('aria-expanded', String(isFlipped));
                    logoBack.setAttribute('aria-hidden', String(!isFlipped));
                    logoLinks.forEach(function(link) {
                        link.setAttribute('tabindex', isFlipped ? '0' : '-1');
                    });
                };

                logoFront.addEventListener('click', function(event) {
                    setLogoFlipped(true);
                    if (event.detail === 0 && logoLinks[0]) {
                        logoLinks[0].focus();
                    }
                });

                logoBack.addEventListener('click', function(event) {
                    if (event.target.closest('a')) return;
                    setLogoFlipped(false);
                });

                document.addEventListener('keydown', function(event) {
                    if (event.key === 'Escape') {
                        setLogoFlipped(false);
                    }
                });

                setLogoFlipped(false);
            }
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="background"></div>
        <div class="smoke-layer" aria-hidden="true">
            <span class="smoke" style="--x: 8%; --size: 34vmin; --duration: 5.5s; --delay: -4.5s; --drift: 18vw; --rotate: -9deg; --opacity: 0.3;"></span>
            <span class="smoke" style="--x: 18%; --size: 42vmin; --duration: 7s; --delay: -2.75s; --drift: -10vw; --rotate: 12deg; --opacity: 0.24;"></span>
            <span class="smoke" style="--x: 31%; --size: 38vmin; --duration: 6s; --delay: -1.5s; --drift: 12vw; --rotate: -16deg; --opacity: 0.28;"></span>
            <span class="smoke" style="--x: 46%; --size: 52vmin; --duration: 7.75s; --delay: -5.75s; --drift: -14vw; --rotate: 6deg; --opacity: 0.22;"></span>
            <span class="smoke" style="--x: 58%; --size: 37vmin; --duration: 6.25s; --delay: -3.5s; --drift: 9vw; --rotate: 17deg; --opacity: 0.26;"></span>
            <span class="smoke" style="--x: 71%; --size: 46vmin; --duration: 7.25s; --delay: -1s; --drift: -16vw; --rotate: -11deg; --opacity: 0.24;"></span>
            <span class="smoke" style="--x: 86%; --size: 35vmin; --duration: 5.75s; --delay: -4s; --drift: 11vw; --rotate: 8deg; --opacity: 0.27;"></span>
        </div>
        <div class="triangle-top-right"></div>
        <div class="triangle-top-left"></div>
        <div class="triangle-bottom-right"></div>
        <div class="triangle-bottom-left"></div>
        <audio id="background-music" src="/appmogged-bg.mp3" autoplay loop preload="auto"></audio>
        <button class="audio-toggle" type="button" aria-label="Mute music" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 9v6h4l5 4V5L8 9H4Z"></path>
                <path class="sound-wave" d="M16 9.5a4 4 0 0 1 0 5"></path>
                <path class="sound-wave" d="M18.5 7a7.5 7.5 0 0 1 0 10"></path>
                <path class="muted-line" d="M20 4 4 20"></path>
            </svg>
        </button>
        <div class="logo-stage">
            <div class="logo-breath">
                <div class="logo-flipper">
                    <button class="logo-face logo-front" type="button" aria-label="Show AppMogged links" aria-expanded="false" aria-controls="logo-links">
                        <img src="/appmogged.svg" alt="AppMogged">
                    </button>
                    <div class="logo-face logo-back" aria-hidden="true">
                        <svg class="logo-back-shape" viewBox="0 0 410 141" aria-hidden="true" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="logo-back-gradient" x1="0" y1="0" x2="410" y2="141" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#EC407A"></stop>
                                    <stop offset="1" stop-color="#AB47BC"></stop>
                                </linearGradient>
                            </defs>
                            <path transform="translate(0 141) scale(1 -1)" d="M405 28.58L309 5L37 5L5 12.86V112.42L101 136H373L405 128.14L405 28.58Z" fill="url(#logo-back-gradient)"></path>
                        </svg>
                        <nav class="logo-links" id="logo-links" aria-label="AppMogged links">
                            <span class="logo-links-title">Pick your adventure</span>
                            <a href="/connect4/" tabindex="-1">Connect 4</a>
                            <span class="logo-links-dot" aria-hidden="true"></span>
                            <a href="/minesweeper/" tabindex="-1">Minesweeper</a>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
