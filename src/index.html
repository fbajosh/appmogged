<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppMogged. Get mogged.</title>
    <link rel="icon" type="image/svg+xml" href="/appmogged.svg">
    <link rel="stylesheet" href="/style.css">
    <script type="module" src="/main.js"></script>
</head>
<body>
    <div class="container">
        <div class="background"></div>
        <div class="smoke-layer" aria-hidden="true">
            <span class="smoke" style="--x: 8%; --size: 34vmin; --duration: 5.5s; --delay: -4.5s; --drift: 18vw; --rotate: -9deg; --opacity: 0.3;"></span>
            <span class="smoke" style="--x: 18%; --size: 42vmin; --duration: 7s; --delay: -2.75s; --drift: -10vw; --rotate: 12deg; --opacity: 0.24;"></span>
            <span class="smoke" style="--x: 31%; --size: 38vmin; --duration: 6s; --delay: -1.5s; --drift: 12vw; --rotate: -16deg; --opacity: 0.28;"></span>
            <span class="smoke" style="--x: 46%; --size: 52vmin; --duration: 7.75s; --delay: -5.75s; --drift: -14vw; --rotate: 6deg; --opacity: 0.22;"></span>
            <span class="smoke" style="--x: 58%; --size: 37vmin; --duration: 6.25s; --delay: -3.5s; --drift: 9vw; --rotate: 17deg; --opacity: 0.26;"></span>
            <span class="smoke" style="--x: 71%; --size: 46vmin; --duration: 7.25s; --delay: -1s; --drift: -16vw; --rotate: -11deg; --opacity: 0.24;"></span>
            <span class="smoke" style="--x: 86%; --size: 35vmin; --duration: 5.75s; --delay: -4s; --drift: 11vw; --rotate: 8deg; --opacity: 0.27;"></span>
        </div>
        <div class="triangle-top-right"></div>
        <div class="triangle-top-left"></div>
        <div class="triangle-bottom-right"></div>
        <div class="triangle-bottom-left"></div>
        <audio id="background-music" src="/appmogged-bg.mp3" loop preload="auto"></audio>
        <button class="audio-toggle" type="button" aria-label="Mute music" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 9v6h4l5 4V5L8 9H4Z"></path>
                <path class="sound-wave" d="M16 9.5a4 4 0 0 1 0 5"></path>
                <path class="sound-wave" d="M18.5 7a7.5 7.5 0 0 1 0 10"></path>
                <path class="muted-line" d="M20 4 4 20"></path>
            </svg>
        </button>
        <div class="logo-stage" data-logo-flip>
            <div class="logo-breath">
                <div class="logo-flipper">
                    <button class="logo-face logo-front" type="button" aria-label="Show AppMogged links" aria-expanded="false" aria-controls="logo-links">
                        <img src="/appmogged.svg" alt="AppMogged">
                    </button>
                    <div class="logo-face logo-back" aria-hidden="true">
                        <svg class="logo-back-shape" viewBox="0 0 410 141" aria-hidden="true" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="logo-back-gradient" x1="410" y1="0" x2="0" y2="141" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#EC407A"></stop>
                                    <stop offset="1" stop-color="#AB47BC"></stop>
                                </linearGradient>
                            </defs>
                            <path transform="translate(0 141) scale(1 -1)" d="M405 28.58L309 5L37 5L5 12.86V112.42L101 136H373L405 128.14L405 28.58Z" fill="url(#logo-back-gradient)"></path>
                        </svg>
                        <nav class="logo-links" id="logo-links" aria-label="AppMogged links">
                            <span class="logo-links-title">Pick your adventure</span>
                            <a href="/connect4/" tabindex="-1">Connect 4</a>
                            <span class="logo-links-dot" aria-hidden="true"></span>
                            <a href="/minesweeper/" tabindex="-1">Minesweeper</a>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
